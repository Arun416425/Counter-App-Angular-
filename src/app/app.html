<div class="main">
  <h1>Simple Counter</h1>
  <h2>{{count}}</h2>
  <div class="btns">
    <button (click)="handleClick('inc')" class="incbtn">+</button>
    <button (click)="handleClick('dec')" class="decbtn">-</button>
    <button (click)="handleClick('reset')" class="reset">Reset</button>
  </div>
</div>
